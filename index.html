<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warlocks - Isometric Brawler</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="hud">
    <div class="player-hud p1">
      <div class="player-name" id="p1-name">Player 1</div>
      <div class="hp-bar-bg"><div class="hp-bar-fill" id="p1-hp" style="width:100%; background:#4fc3f7;"></div></div>
      <div class="cooldowns" id="p1-cooldowns"></div>
    </div>
    <div class="player-hud p2">
      <div class="player-name" id="p2-name">Bot</div>
      <div class="hp-bar-bg"><div class="hp-bar-fill" id="p2-hp" style="width:100%; background:#ef5350;"></div></div>
      <div class="cooldowns" id="p2-cooldowns"></div>
    </div>
    <div id="center-msg"></div>
    <div id="score"></div>
    <div id="controls-hint">
      WASD move | Mouse aim<br>
      LMB shockwave | RMB fireball<br>
      Q hook | Space dash | E shield
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
